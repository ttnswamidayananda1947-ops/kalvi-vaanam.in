<!DOCTYPE html>    
<html lang="ta">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title id="metaTitle">கட்டுரைகள் | Kalvi Vaanam</title>    

<meta name="description" content="Kalvi Vaanam வழங்கும் கல்வி சார்ந்த கட்டுரைகள்.">
<meta name="robots" content="index, follow">

<style>    
body{ margin:0; font-family: Arial, sans-serif; background:#f9f9f9; color: #333; }    
    
/* ✅ HEADER STYLE */
.header{ display:flex; justify-content:space-between; align-items:center; padding:15px; background:#0d47a1; color:white; }    
.logo-area{ display:flex; align-items:center; gap:10px; }    
.logo-box{ width:40px; height:40px; border-radius:50%; overflow:hidden; background:#ffffff; }    
.logo-box img{ width:100%; height:100%; object-fit:cover; }    
.site-name{ font-size:22px; font-weight:bold; }    
.menu-btn{ font-size:26px; cursor:pointer; }    
    
/* ✅ SIDE MENU */
.side-menu{ position:fixed; top:0; left:-100%; width:250px; height:100%; background:#f5f5f5; box-shadow:2px 0 5px rgba(0,0,0,0.2); transition:0.3s; padding:20px; z-index:1000; }    
.side-menu a{ display:block; margin:20px 0; text-decoration:none; color:#333; font-size:18px; }    
.close-btn{ font-size:22px; cursor:pointer; text-align:right; }    
    
/* ✅ ARTICLE LIST STYLE */
.container{ max-width: 800px; margin: 30px auto; padding: 15px; }
.list-title{ font-size: 24px; color: #0d47a1; border-left: 5px solid #0d47a1; padding-left: 10px; margin-bottom: 20px; }

.article-item {
    background: white;
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid #eee;
}
.article-item:hover { transform: translateY(-3px); border-color: #0d47a1; }
.article-item h3 { margin: 0; color: #0d47a1; font-size: 19px; }

/* ✅ FULL ARTICLE CONTENT STYLE */
#fullArticleView { display: none; }
.article-card{ background: #ffffff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
h1{ color: #0d47a1; font-size: 26px; margin-top: 10px; line-height: 1.3; border-bottom: 2px solid #eee; padding-bottom: 10px; }
#artContent{ font-size: 18px; text-align: justify; white-space: pre-wrap; line-height: 1.8; margin-top: 20px; }

.back-link { color: #0d47a1; cursor: pointer; font-weight: bold; display: inline-block; margin-bottom: 15px; background: #e3f2fd; padding: 8px 15px; border-radius: 5px; }

/* ✅ FOOTER STYLE */
.footer{ background:#eeeeee; padding:40px 20px; text-align:center; margin-top:60px; }    
</style>    
</head>    
    
<body>    
    
<div class="header">    
    <div class="logo-area">    
        <div class="logo-box"><img src="logo.png" alt="Kalvi Vaanam Logo"></div>    
        <div class="site-name">Kalvi Vaanam</div>    
    </div>    
    <div class="menu-btn" onclick="openMenu()" aria-label="Open Menu">☰</div>    
</div>    
    
<div class="side-menu" id="menu">    
    <div class="close-btn" onclick="closeMenu()">✖</div>    
    <a href="index.html">Home</a>    
    <a href="mailto:ttnswamidayananda1947@gmail.com">Contact</a>    
</div>    
    
<div class="container">
    <div id="listView">
        <h2 class="list-title">அனைத்து கட்டுரைகள்</h2>
        <div id="articlesContainer">கட்டுரைகள் லோடு ஆகிறது...</div>
    </div>

    <div id="fullArticleView">
        <div class="back-link" onclick="showList()">← மீண்டும் பட்டியலுக்குச் செல்ல</div>
        <div class="article-card">
            <article>
                <h1 id="artHeading">தலைப்பு</h1>
                <div id="artContent">உள்ளடக்கம்...</div>
            </article>
        </div>
    </div>
</div>    
    
<div class="footer">    
    <p>© 2026 Kalvi Vaanam</p>    
</div>    
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDADvn4P8g_Dk6fraPNk56Ansrfx5ezgJU",
        authDomain: "kalvi-vaanam-db.firebaseapp.com",
        projectId: "kalvi-vaanam-db",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("articlesContainer");
    const listView = document.getElementById("listView");
    const fullView = document.getElementById("fullArticleView");

    // 1. கட்டுரைகளின் தலைப்புகளை மட்டும் லோடு செய்யும் பங்க்ஷன்
    async function loadArticlesList() {
        try {
            // orderBy("createdAt") நீக்கப்பட்டுள்ளது ஏனெனில் அட்மின் பேனலில் அதை நாம் சேமிக்கவில்லை
            const querySnapshot = await getDocs(collection(db, "articles"));
            container.innerHTML = "";

            if (querySnapshot.empty) {
                container.innerHTML = "தற்போது கட்டுரைகள் எதுவும் இல்லை.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement("div");
                item.className = "article-item";
                item.onclick = () => viewArticle(doc.id); // டாக்குமெண்ட் ID-ஐ வைத்து கிளிக் செய்யப்படுகிறது
                
                item.innerHTML = `<h3>${data.title}</h3>`;
                container.appendChild(item);
            });
        } catch (err) {
            console.error(err);
            container.innerHTML = "கட்டுரைகளை லோடு செய்வதில் பிழை.";
        }
    }

    // 2. கிளிக் செய்த கட்டுரையை மட்டும் முழுமையாக காட்டும் பங்க்ஷன்
    async function viewArticle(id) {
        listView.style.display = "none";
        fullView.style.display = "block";
        window.scrollTo(0, 0);

        try {
            const docRef = doc(db, "articles", id);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("artHeading").innerText = data.title;
                document.getElementById("artContent").innerText = data.content;
                
                document.title = data.title + " | Kalvi Vaanam";
            }
        } catch (err) {
            alert("உள்ளடக்கத்தை லோடு செய்வதில் பிழை");
        }
    }

    // பட்டியலுக்குத் திரும்பச் செல்ல
    window.showList = function() {
        fullView.style.display = "none";
        listView.style.display = "block";
        document.title = "கட்டுரைகள் | Kalvi Vaanam";
    }

    loadArticlesList();
</script>

<script>    
function openMenu(){ document.getElementById("menu").style.left="0"; }    
function closeMenu(){ document.getElementById("menu").style.left="-100%"; }    
</script>    
    
</body>    
</html>
