<div class="container">
    <div id="listView">
        <h2 class="list-title">அனைத்து கட்டுரைகள்</h2>
        <div id="articlesContainer">கட்டுரைகள் லோடு ஆகிறது...</div>
    </div>

    <div id="fullArticleView">
        <div class="back-link" onclick="showList()">← மீண்டும் பட்டியலுக்குச் செல்ல</div>
        <div class="article-card">
            <article>
                <span class="category-badge" id="artCategory">CATEGORY</span>
                <h1 id="artHeading">தலைப்பு</h1>
                <div class="meta-info">
                    பதிவேற்றியவர்: Kalvi Vaanam Team | தேதி: <span id="artDate">--</span>
                </div>
                <div id="artContent">உள்ளடக்கம்...</div>
            </article>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDADvn4P8g_Dk6fraPNk56Ansrfx5ezgJU",
        authDomain: "kalvi-vaanam-db.firebaseapp.com",
        projectId: "kalvi-vaanam-db",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("articlesContainer");
    const listView = document.getElementById("listView");
    const fullView = document.getElementById("fullArticleView");

    // 1. அனைத்து தலைப்புகளையும் லோடு செய்யும் பங்க்ஷன்
    async function loadArticlesList() {
        try {
            const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            container.innerHTML = "";

            if (querySnapshot.empty) {
                container.innerHTML = "தற்போது கட்டுரைகள் எதுவும் இல்லை.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement("div");
                item.className = "article-item";
                item.onclick = () => viewArticle(doc.id); // கிளிக் செய்தால் கட்டுரை காட்டும்
                
                item.innerHTML = `
                    <h3>${data.title}</h3>
                    <p>${data.category || 'General'} | ${data.createdAt ? data.createdAt.toDate().toLocaleDateString('ta-IN') : ''}</p>
                `;
                container.appendChild(item);
            });
        } catch (err) {
            console.error(err);
            container.innerHTML = "Error loading articles.";
        }
    }

    // 2. குறிப்பிட்ட ஒரு கட்டுரையை மட்டும் காட்டும் பங்க்ஷன்
    async function viewArticle(slug) {
        listView.style.display = "none";
        fullView.style.display = "block";
        window.scrollTo(0, 0);

        try {
            const docRef = doc(db, "articles", slug);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("artHeading").innerText = data.title;
                document.getElementById("artCategory").innerText = data.category || "General";
                document.getElementById("artContent").innerText = data.content;
                document.getElementById("artDate").innerText = data.createdAt ? data.createdAt.toDate().toLocaleDateString('ta-IN') : "--";
                
                // ✅ DYNAMIC META UPDATE
                document.title = data.title + " | Kalvi Vaanam";
                // Page description Update (Optional via JS)
                const descMeta = document.querySelector('meta[name="description"]');
                if(descMeta) descMeta.setAttribute("content", data.content.substring(0, 150));
            }
        } catch (err) {
            alert("Error loading content");
        }
    }

    // பட்டியலுக்குத் திரும்பச் செல்ல
    window.showList = function() {
        fullView.style.display = "none";
        listView.style.display = "block";
        document.title = "கட்டுரைகள் | Kalvi Vaanam";
    }

    loadArticlesList();
</script>
